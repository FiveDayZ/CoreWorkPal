<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <linearGradient id="boxG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d3d4f"/>
      <stop offset="100%" stop-color="#141c26"/>
    </linearGradient>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Glowing Warning Boundary Shield -->
  <rect x="47" y="32" width="66" height="28" rx="6" fill="url(#boxG)" stroke="#ff7443" stroke-width="2.2" filter="url(#neonGlow)"/>

  <!-- RAM Memory Gold Circuit Line -->
  <line x1="52" y1="43" x2="108" y2="43" stroke="#ffd086" stroke-width="2.5" stroke-linecap="round"/>

  <!-- RAM Chip Modules (Gold/Amber details) -->
  <rect x="56" y="49" width="7" height="6" rx="1.2" fill="#ffd086"/>
  <rect x="71" y="49" width="7" height="6" rx="1.2" fill="#ffd086"/>
  <rect x="86" y="49" width="7" height="6" rx="1.2" fill="#ffd086"/>
  <rect x="97" y="49" width="7" height="6" rx="1.2" fill="#ffd086"/>

  <!-- Small tech dots and lines -->
  <circle cx="52" cy="37" r="1" fill="#ff7443"/>
  <circle cx="108" cy="37" r="1" fill="#ff7443"/>
  <line x1="58" y1="37" x2="102" y2="37" stroke="#ffffff" stroke-width="0.8" opacity="0.3" stroke-dasharray="2,2"/>
</svg>
