<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <linearGradient id="armG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb170"/>
      <stop offset="50%" stop-color="#f28a3d"/>
      <stop offset="100%" stop-color="#b64e19"/>
    </linearGradient>
    <linearGradient id="pawG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff6ee"/>
      <stop offset="100%" stop-color="#eed0ba"/>
    </linearGradient>
    <linearGradient id="fanShieldG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d3f52"/>
      <stop offset="100%" stop-color="#141d26"/>
    </linearGradient>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Right Arm with gradient -->
  <path d="M114 86 C121 88 121 104 114 114 L110 121 C107 125 101 125 98 121 C95 117 95 105 99 97 Z" fill="url(#armG)"/>
  
  <!-- Cream paw tip -->
  <path d="M112 116 L110 121 C107 125 101 125 103 121 L105 118 C107 121 112 122 112 116 Z" fill="url(#pawG)"/>
  
  <!-- Fan shaft extending from paw -->
  <path d="M110 114 L120 124" stroke="#455a64" stroke-width="4" stroke-linecap="round"/>
  <path d="M110 114 L120 124" stroke="#cfd8dc" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Fan Guard/Housing -->
  <circle cx="125" cy="127" r="12" fill="url(#fanShieldG)" stroke="#5ed0ff" stroke-width="1.5" filter="url(#neonGlow)"/>
  
  <!-- Fan Blades (Cyan Neon lines representing rotating blades) -->
  <circle cx="125" cy="127" r="3" fill="#ffffff"/>
  <path d="M125 117 L125 137 M115 127 L135 127" stroke="#82e9ff" stroke-width="1.5" opacity="0.85"/>
  <path d="M118 120 L132 134 M118 134 L132 120" stroke="#82e9ff" stroke-width="1.2" opacity="0.65"/>

  <!-- Shoulder Joint -->
  <circle cx="102" cy="92" r="5" fill="#2d3f52" stroke="#48607a" stroke-width="1.5"/>
</svg>
