<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Cyber LED Focused Eyes (Determination / work mode) -->
  <!-- Left Eye -->
  <path d="M56 68 L70 64" stroke="#5ed0ff" stroke-width="3.5" stroke-linecap="round" filter="url(#neonGlow)"/>
  <path d="M57 68 L69 64" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Right Eye -->
  <path d="M90 64 L104 68" stroke="#5ed0ff" stroke-width="3.5" stroke-linecap="round" filter="url(#neonGlow)"/>
  <path d="M91 64 L103 68" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>
</svg>
