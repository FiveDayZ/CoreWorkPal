<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Cyber LED Blinking Eyes (Horizontal glow strips) -->
  <!-- Left Eye -->
  <line x1="56" y1="66" x2="71" y2="66" stroke="#5ed0ff" stroke-width="2.5" stroke-linecap="round" filter="url(#neonGlow)"/>
  <line x1="58" y1="66" x2="69" y2="66" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>
  <!-- Right Eye -->
  <line x1="89" y1="66" x2="104" y2="66" stroke="#5ed0ff" stroke-width="2.5" stroke-linecap="round" filter="url(#neonGlow)"/>
  <line x1="91" y1="66" x2="102" y2="66" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>
</svg>
