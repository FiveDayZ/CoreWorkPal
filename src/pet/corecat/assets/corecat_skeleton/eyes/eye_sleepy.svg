<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Cyber LED Sleepy Eyes (Happy curve arcs) -->
  <!-- Left Eye -->
  <path d="M57 63 Q63.5 70 70 63" fill="none" stroke="#5ed0ff" stroke-width="2.5" stroke-linecap="round" filter="url(#neonGlow)"/>
  <path d="M58 63 Q63.5 69 69 63" fill="none" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Right Eye -->
  <path d="M90 63 Q96.5 70 103 63" fill="none" stroke="#5ed0ff" stroke-width="2.5" stroke-linecap="round" filter="url(#neonGlow)"/>
  <path d="M91 63 Q96.5 69 102 63" fill="none" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round"/>
</svg>
