  <path d="M59 62 L68 70 M68 62 L59 70" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Right Eye -->
  <path d="M92 62 L101 70 M101 62 L92 70" stroke="#5ed0ff" stroke-width="2.5" stroke-linecap="round" filter="url(#neonGlow)"/>
  <path d="M92 62 L101 70 M101 62 L92 70" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round"/>
</svg>
