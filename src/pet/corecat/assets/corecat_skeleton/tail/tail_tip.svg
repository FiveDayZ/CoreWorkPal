<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <linearGradient id="orangeG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb170"/>
      <stop offset="50%" stop-color="#f28a3d"/>
      <stop offset="100%" stop-color="#b8521d"/>
    </linearGradient>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Tail tip path -->
  <path d="M39 80 C43 67 56 64 63 72" fill="none" stroke="url(#orangeG)" stroke-width="12" stroke-linecap="round"/>
  <!-- Glowing mechanical tip light -->
  <circle cx="63" cy="72" r="7" fill="#5ed0ff" filter="url(#neonGlow)"/>
  <circle cx="63" cy="72" r="3" fill="#ffffff"/>
</svg>
