<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <linearGradient id="orangeG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb170"/>
      <stop offset="50%" stop-color="#f28a3d"/>
      <stop offset="100%" stop-color="#b8521d"/>
    </linearGradient>
    <linearGradient id="metalG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4e657e"/>
      <stop offset="100%" stop-color="#1f2c3a"/>
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Middle tail segment -->
  <path d="M48 102 C37 96 34 84 40 76" fill="none" stroke="url(#orangeG)" stroke-width="15" stroke-linecap="round"/>
  <!-- Metallic joint ring -->
  <path d="M46 101 C44 99 41 96 42 97" fill="none" stroke="url(#metalG)" stroke-width="17" stroke-linecap="round"/>
  <!-- Neon energy circuit -->
  <path d="M41 93 C36 89 35 83 38 78" fill="none" stroke="#5ed0ff" stroke-width="3" stroke-linecap="round" filter="url(#neonGlow)"/>
</svg>
