<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 40" shape-rendering="crispEdges">
  <!-- Grid background -->
  <path d="M 0 10 H 140 M 0 20 H 140 M 0 30 H 140 M 20 0 V 40 M 40 0 V 40 M 60 0 V 40 M 80 0 V 40 M 100 0 V 40 M 120 0 V 40" stroke="#0e1b27" stroke-width="1" />

  <!-- Left Side: 3D Viewport -->
  <rect x="5" y="5" width="40" height="30" fill="#051118" stroke="#16435c" stroke-width="1" />
  <!-- 3D wireframe cube -->
  <!-- Top face -->
  <polygon points="25,9 35,14 25,19 15,14" fill="none" stroke="#3fc7ff" stroke-width="1" />
  <!-- Side faces -->
  <line x1="15" y1="14" x2="15" y2="26" stroke="#3fc7ff" stroke-width="1" />
  <line x1="25" y1="19" x2="25" y2="31" stroke="#3fc7ff" stroke-width="1" />
  <line x1="35" y1="14" x2="35" y2="26" stroke="#3fc7ff" stroke-width="1" />
  <polygon points="15,26 25,31 35,26" fill="none" stroke="#16435c" stroke-width="1" />
  <!-- Axis labels -->
  <line x1="8" y1="32" x2="12" y2="32" stroke="#ff5533" stroke-width="1" />
  <line x1="8" y1="32" x2="8" y2="28" stroke="#5cda71" stroke-width="1" />

  <!-- Middle: Rendering Bars -->
  <rect x="52" y="10" width="10" height="6" fill="#3fc7ff" opacity="0.3" />
  <rect x="52" y="18" width="18" height="6" fill="#3fc7ff" opacity="0.6" />
  <rect x="52" y="26" width="26" height="6" fill="#3fc7ff" />

  <!-- Right Side: GPU Graphics Card -->
  <rect x="88" y="8" width="46" height="24" fill="#0c212e" stroke="#3fc7ff" stroke-width="2" />
  <!-- PCIe pins -->
  <path d="M 94 32 H 114" stroke="#ffd75e" stroke-width="2" />
  <!-- Fans -->
  <circle cx="101" cy="20" r="7" fill="none" stroke="#3fc7ff" stroke-width="1.5" />
  <circle cx="101" cy="20" r="2" fill="#ffd75e" />
  <line x1="101" y1="14" x2="101" y2="26" stroke="#3fc7ff" stroke-width="1" />
  <line x1="95" y1="20" x2="107" y2="20" stroke="#3fc7ff" stroke-width="1" />
  
  <circle cx="121" cy="20" r="7" fill="none" stroke="#3fc7ff" stroke-width="1.5" />
  <circle cx="121" cy="20" r="2" fill="#ffd75e" />
  <line x1="121" y1="14" x2="121" y2="26" stroke="#3fc7ff" stroke-width="1" />
  <line x1="115" y1="20" x2="127" y2="20" stroke="#3fc7ff" stroke-width="1" />
</svg>
